name: NPS CEO News Monitor Bot

on:
  schedule:
    - cron: '*/1 * * * *'  # 1분마다 자동 실행
  workflow_dispatch:      # 수동 실행 허용

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write     # 파일 쓰기 권한 필수
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade -r requirements.txt

      - name: Run bot
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python nps_news_bot.py
        
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # news_history.csv 파일이 있을 때만 스테이징에 추가합니다.
          if [ -f news_history.csv ]; then
            git add news_history.csv
          fi
          
          # 변경사항(새로운 기사)이 있을 때만 커밋하고 푸시합니다.
          # [skip ci]를 넣어 액션 재실행을 방지합니다.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update news history [skip ci]" && git push)
